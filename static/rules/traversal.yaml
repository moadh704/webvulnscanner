rules:

  # ── PHP: include/require with user input (single-line) ──────────────────────
  - id: php-traversal-include
    patterns:
      - pattern: include($_GET[$KEY]);
      - pattern: include($_POST[$KEY]);
      - pattern: include($_REQUEST[$KEY]);
      - pattern: include($PATH . $_GET[$KEY]);
      - pattern: include($PATH . $_POST[$KEY]);
      - pattern: include($PATH . $_REQUEST[$KEY]);
    message: >
      User input passed directly to include(). An attacker can traverse
      the filesystem and include arbitrary files. Validate against a
      whitelist of allowed filenames.
    languages: [php]
    severity: ERROR
    metadata:
      owasp: "A01:2025 - Broken Access Control"
      confidence: HIGH
      vuln_type: traversal

  - id: php-traversal-require
    patterns:
      - pattern: require($_GET[$KEY]);
      - pattern: require($_POST[$KEY]);
      - pattern: require($_REQUEST[$KEY]);
      - pattern: require($PATH . $_GET[$KEY]);
      - pattern: require($PATH . $_POST[$KEY]);
      - pattern: require($PATH . $_REQUEST[$KEY]);
    message: >
      User input passed to require(). Validate against a whitelist
      of allowed file names to prevent path traversal.
    languages: [php]
    severity: ERROR
    metadata:
      owasp: "A01:2025 - Broken Access Control"
      confidence: HIGH
      vuln_type: traversal

  - id: php-traversal-file-get-contents
    patterns:
      - pattern: file_get_contents($_GET[$KEY]);
      - pattern: file_get_contents($_POST[$KEY]);
      - pattern: file_get_contents($_REQUEST[$KEY]);
      - pattern: file_get_contents($BASE . $_GET[$KEY]);
      - pattern: file_get_contents($BASE . $_POST[$KEY]);
      - pattern: file_get_contents($BASE . $_REQUEST[$KEY]);
    message: >
      User input used in file_get_contents() path. Sanitize the path
      and validate it stays within the expected directory.
    languages: [php]
    severity: ERROR
    metadata:
      owasp: "A01:2025 - Broken Access Control"
      confidence: HIGH
      vuln_type: traversal

  # ── PHP: two-step taint — variable from GET/POST/REQUEST then included ──────
  # Matches DVWA-style code:
  #   $file = $_GET['page'];
  #   include($file);
  - id: php-traversal-taint-include-get
    pattern: |
      $VAR = $_GET[$KEY];
      ...
      include($VAR);
    message: >
      User input from $_GET assigned to variable then passed to include().
      An attacker can include arbitrary files. Validate against a whitelist.
    languages: [php]
    severity: ERROR
    metadata:
      owasp: "A01:2025 - Broken Access Control"
      confidence: HIGH
      vuln_type: traversal

  - id: php-traversal-taint-include-post
    pattern: |
      $VAR = $_POST[$KEY];
      ...
      include($VAR);
    message: >
      User input from $_POST assigned to variable then passed to include().
      An attacker can include arbitrary files. Validate against a whitelist.
    languages: [php]
    severity: ERROR
    metadata:
      owasp: "A01:2025 - Broken Access Control"
      confidence: HIGH
      vuln_type: traversal

  - id: php-traversal-taint-include-request
    pattern: |
      $VAR = $_REQUEST[$KEY];
      ...
      include($VAR);
    message: >
      User input from $_REQUEST assigned to variable then passed to include().
      An attacker can include arbitrary files. Validate against a whitelist.
    languages: [php]
    severity: ERROR
    metadata:
      owasp: "A01:2025 - Broken Access Control"
      confidence: HIGH
      vuln_type: traversal

  - id: php-traversal-taint-include-concat-get
    pattern: |
      $VAR = $_GET[$KEY];
      ...
      include($PATH . $VAR);
    message: >
      User input from $_GET concatenated into include() path. Validate
      the resolved path stays within the intended directory (use realpath).
    languages: [php]
    severity: ERROR
    metadata:
      owasp: "A01:2025 - Broken Access Control"
      confidence: HIGH
      vuln_type: traversal

  - id: php-traversal-taint-include-concat-request
    pattern: |
      $VAR = $_REQUEST[$KEY];
      ...
      include($PATH . $VAR);
    message: >
      User input from $_REQUEST concatenated into include() path. Validate
      the resolved path stays within the intended directory (use realpath).
    languages: [php]
    severity: ERROR
    metadata:
      owasp: "A01:2025 - Broken Access Control"
      confidence: HIGH
      vuln_type: traversal

  - id: php-traversal-taint-readfile-get
    pattern: |
      $VAR = $_GET[$KEY];
      ...
      readfile($VAR);
    message: >
      User input from $_GET assigned to variable then passed to readfile().
      Validate the path against a whitelist.
    languages: [php]
    severity: ERROR
    metadata:
      owasp: "A01:2025 - Broken Access Control"
      confidence: HIGH
      vuln_type: traversal

  # ── PHP: ternary taint — variable from ternary involving GET/POST/REQUEST ───
  - id: php-traversal-taint-ternary
    patterns:
      - pattern-either:
          - pattern: |
              $VAR = $COND ? $_GET[$KEY] : $X;
              ...
              include($VAR);
          - pattern: |
              $VAR = $COND ? $X : $_GET[$KEY];
              ...
              include($VAR);
          - pattern: |
              $VAR = $COND ? $_POST[$KEY] : $X;
              ...
              include($VAR);
          - pattern: |
              $VAR = $COND ? $X : $_POST[$KEY];
              ...
              include($VAR);
          - pattern: |
              $VAR = $COND ? $_REQUEST[$KEY] : $X;
              ...
              include($VAR);
          - pattern: |
              $VAR = $COND ? $X : $_REQUEST[$KEY];
              ...
              include($VAR);
          - pattern: |
              $VAR = $COND ? $_GET[$KEY] : $X;
              ...
              include($PATH . $VAR);
          - pattern: |
              $VAR = $COND ? $X : $_GET[$KEY];
              ...
              include($PATH . $VAR);
          - pattern: |
              $VAR = $COND ? $_REQUEST[$KEY] : $X;
              ...
              include($PATH . $VAR);
          - pattern: |
              $VAR = $COND ? $X : $_REQUEST[$KEY];
              ...
              include($PATH . $VAR);
    message: >
      User input from $_GET/$_POST/$_REQUEST via ternary expression flows into
      include(). An attacker can include arbitrary files. Validate against a whitelist.
    languages: [php]
    severity: ERROR
    metadata:
      owasp: "A01:2025 - Broken Access Control"
      confidence: MEDIUM
      vuln_type: traversal

  # ── PHP: Mutillidae-style ternary taint — include sink ─────────────────────
  - id: php-traversal-taint-mutillidae-style
    patterns:
      - pattern-either:
          # Shape A: isset() ternary
          - pattern: |
              $V = isset($_GET[$K]) ? $_GET[$K] : $D;
              ...
              include($V);
          - pattern: |
              $V = isset($_POST[$K]) ? $_POST[$K] : $D;
              ...
              include($V);
          - pattern: |
              $V = isset($_REQUEST[$K]) ? $_REQUEST[$K] : $D;
              ...
              include($V);
          - pattern: |
              $V = isset($_GET[$K]) ? $_GET[$K] : $D;
              ...
              include($PATH . $V);
          - pattern: |
              $V = isset($_POST[$K]) ? $_POST[$K] : $D;
              ...
              include($PATH . $V);
          - pattern: |
              $V = isset($_REQUEST[$K]) ? $_REQUEST[$K] : $D;
              ...
              include($PATH . $V);
          # Shape B: ternary-wraps-assignment
          - pattern: |
              $C ? $V = $_POST[$K] : $V = $_REQUEST[$K2];
              ...
              include($V);
          - pattern: |
              $C ? $V = $_GET[$K] : $V = $_REQUEST[$K2];
              ...
              include($V);
          - pattern: |
              $C ? $V = $_POST[$K] : $V = $_REQUEST[$K2];
              ...
              include($PATH . $V);
          - pattern: |
              $C ? $V = $_GET[$K] : $V = $_REQUEST[$K2];
              ...
              include($PATH . $V);
          # Shape C: null-coalescing
          - pattern: |
              $V = $_GET[$K] ?? $_POST[$K2] ?? $D;
              ...
              include($V);
          - pattern: |
              $V = $_POST[$K] ?? $_GET[$K2] ?? $D;
              ...
              include($V);
    message: >
      User input via Mutillidae-style ternary (isset, ternary-wraps-assignment,
      or null-coalescing) flows into include(). An attacker can include
      arbitrary files. Validate against a whitelist.
    languages: [php]
    severity: ERROR
    metadata:
      owasp: "A01:2025 - Broken Access Control"
      confidence: MEDIUM
      vuln_type: traversal

  # ── Python: open() with user input ──────────────────────────────────────────
  - id: python-traversal-open
    patterns:
      - pattern: open(request.args.get($KEY))
      - pattern: open(request.form.get($KEY))
      - pattern: open($BASE + request.args.get($KEY))
    message: >
      User input used in file open() call. Use os.path.realpath() and
      validate the resolved path is within the intended directory.
    languages: [python]
    severity: ERROR
    metadata:
      owasp: "A01:2025 - Broken Access Control"
      confidence: HIGH
      vuln_type: traversal

  # ── JavaScript/Node: fs.readFile with user input ────────────────────────────
  - id: js-traversal-readfile
    patterns:
      - pattern: fs.readFile(req.$METHOD.$KEY, ...)
      - pattern: fs.readFileSync(req.$METHOD.$KEY)
      - pattern: fs.readFile($BASE + req.$METHOD.$KEY, ...)
    message: >
      User input used in fs.readFile() path. Sanitize and validate
      the path to prevent directory traversal attacks.
    languages: [javascript, typescript]
    severity: ERROR
    metadata:
      owasp: "A01:2025 - Broken Access Control"
      confidence: HIGH
      vuln_type: traversal
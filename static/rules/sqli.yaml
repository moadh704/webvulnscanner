rules:

  # ── PHP: direct user input in mysqli_query ──────────────────────────────────
  - id: php-sqli-mysqli-get
    patterns:
      - pattern: mysqli_query($CONN, $QUERY . $_GET[$KEY])
      - pattern: mysqli_query($CONN, $QUERY . $_POST[$KEY])
      - pattern: mysqli_query($CONN, $QUERY . $_REQUEST[$KEY])
    message: >
      User input from $_GET/$_POST/$_REQUEST flows directly into
      mysqli_query() without parameterization. Use prepared statements.
    languages: [php]
    severity: ERROR
    metadata:
      owasp: "A03:2025 - Injection"
      confidence: HIGH
      vuln_type: sqli

  # ── PHP: two-step — variable assigned from GET/POST then used in query ───────
  - id: php-sqli-taint-get
    pattern: |
      $VAR = $_GET[$KEY];
      ...
      mysqli_query($CONN, $QUERY);
    message: >
      User input from $_GET assigned to variable used in mysqli_query().
      Use prepared statements with bound parameters.
    languages: [php]
    severity: ERROR
    metadata:
      owasp: "A03:2025 - Injection"
      confidence: HIGH
      vuln_type: sqli

  - id: php-sqli-taint-post
    pattern: |
      $VAR = $_POST[$KEY];
      ...
      mysqli_query($CONN, $QUERY);
    message: >
      User input from $_POST assigned to variable used in mysqli_query().
      Use prepared statements with bound parameters.
    languages: [php]
    severity: ERROR
    metadata:
      owasp: "A03:2025 - Injection"
      confidence: HIGH
      vuln_type: sqli

  - id: php-sqli-taint-request
    pattern: |
      $VAR = $_REQUEST[$KEY];
      ...
      mysqli_query($CONN, $QUERY);
    message: >
      User input from $_REQUEST used in mysqli_query().
      Use prepared statements with bound parameters.
    languages: [php]
    severity: ERROR
    metadata:
      owasp: "A03:2025 - Injection"
      confidence: MEDIUM
      vuln_type: sqli

  # ── PHP: string interpolation with user input ────────────────────────────────
  - id: php-sqli-interpolation-get
    patterns:
      - pattern: |
          $VAR = $_GET[$KEY];
          ...
          $QUERY = "...$VAR...";
      - pattern: |
          $VAR = $_POST[$KEY];
          ...
          $QUERY = "...$VAR...";
    message: >
      User input interpolated into SQL query string.
      Use prepared statements instead.
    languages: [php]
    severity: ERROR
    metadata:
      owasp: "A03:2025 - Injection"
      confidence: HIGH
      vuln_type: sqli

  # ── PHP: mysql_query (legacy) ────────────────────────────────────────────────
  - id: php-sqli-mysql-query
    patterns:
      - pattern: mysql_query($QUERY . $_GET[$KEY])
      - pattern: mysql_query($QUERY . $_POST[$KEY])
    message: >
      User input flows directly into mysql_query(). Use PDO
      prepared statements instead.
    languages: [php]
    severity: ERROR
    metadata:
      owasp: "A03:2025 - Injection"
      confidence: HIGH
      vuln_type: sqli

  # ── PHP: ternary taint — variable from ternary involving GET/POST/REQUEST ───
  - id: php-sqli-taint-ternary
    patterns:
      - pattern-either:
          - pattern: |
              $VAR = $COND ? $_GET[$KEY] : $X;
              ...
              mysqli_query($CONN, $QUERY);
          - pattern: |
              $VAR = $COND ? $X : $_GET[$KEY];
              ...
              mysqli_query($CONN, $QUERY);
          - pattern: |
              $VAR = $COND ? $_POST[$KEY] : $X;
              ...
              mysqli_query($CONN, $QUERY);
          - pattern: |
              $VAR = $COND ? $X : $_POST[$KEY];
              ...
              mysqli_query($CONN, $QUERY);
          - pattern: |
              $VAR = $COND ? $_REQUEST[$KEY] : $X;
              ...
              mysqli_query($CONN, $QUERY);
          - pattern: |
              $VAR = $COND ? $X : $_REQUEST[$KEY];
              ...
              mysqli_query($CONN, $QUERY);
    message: >
      User input from $_GET/$_POST/$_REQUEST via ternary expression flows into
      mysqli_query(). Use prepared statements with bound parameters.
    languages: [php]
    severity: ERROR
    metadata:
      owasp: "A03:2025 - Injection"
      confidence: MEDIUM
      vuln_type: sqli

  # ── PHP: Mutillidae-style ternary taint — mysqli_query sink ─────────────────
  - id: php-sqli-taint-mutillidae-style
    patterns:
      - pattern-either:
          # Shape A: isset() ternary
          - pattern: |
              $V = isset($_GET[$K]) ? $_GET[$K] : $D;
              ...
              mysqli_query($CONN, $QUERY);
          - pattern: |
              $V = isset($_POST[$K]) ? $_POST[$K] : $D;
              ...
              mysqli_query($CONN, $QUERY);
          - pattern: |
              $V = isset($_REQUEST[$K]) ? $_REQUEST[$K] : $D;
              ...
              mysqli_query($CONN, $QUERY);
          # Shape B: ternary-wraps-assignment
          - pattern: |
              $C ? $V = $_POST[$K] : $V = $_REQUEST[$K2];
              ...
              mysqli_query($CONN, $QUERY);
          - pattern: |
              $C ? $V = $_GET[$K] : $V = $_REQUEST[$K2];
              ...
              mysqli_query($CONN, $QUERY);
          - pattern: |
              $C ? $V = $_POST[$K] : $V = $_GET[$K2];
              ...
              mysqli_query($CONN, $QUERY);
          # Shape C: null-coalescing
          - pattern: |
              $V = $_GET[$K] ?? $_POST[$K2] ?? $D;
              ...
              mysqli_query($CONN, $QUERY);
          - pattern: |
              $V = $_POST[$K] ?? $_GET[$K2] ?? $D;
              ...
              mysqli_query($CONN, $QUERY);
    message: >
      User input via Mutillidae-style ternary (isset, ternary-wraps-assignment,
      or null-coalescing) flows into mysqli_query(). Use prepared statements
      with bound parameters.
    languages: [php]
    severity: ERROR
    metadata:
      owasp: "A03:2025 - Injection"
      confidence: MEDIUM
      vuln_type: sqli

  # ── Python: string concatenation in execute() ───────────────────────────────
  - id: python-sqli-execute-concat
    patterns:
      - pattern: $CURSOR.execute("..." + request.$METHOD.get($KEY))
      - pattern: $CURSOR.execute("SELECT ..." + $VAR)
      - pattern: $CURSOR.execute(f"... {$VAR} ...")
    message: >
      User input concatenated directly into SQL execute() call.
      Use parameterized queries: cursor.execute(query, (param,))
    languages: [python]
    severity: ERROR
    metadata:
      owasp: "A03:2025 - Injection"
      confidence: HIGH
      vuln_type: sqli

  # ── JavaScript/Node: string concatenation in db.query ───────────────────────
  - id: js-sqli-query-concat
    patterns:
      - pattern: db.query("..." + req.$METHOD.$KEY)
      - pattern: connection.query("SELECT ..." + $VAR)
    message: >
      User input concatenated into database query.
      Use parameterized queries with placeholders.
    languages: [javascript, typescript]
    severity: ERROR
    metadata:
      owasp: "A03:2025 - Injection"
      confidence: HIGH
      vuln_type: sqli
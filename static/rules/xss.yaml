rules:

  # ── PHP: echo/print of unsanitized user input (single-line) ─────────────────
  - id: php-xss-echo-get
    patterns:
      - pattern: echo $_GET[$KEY];
      - pattern: echo $_POST[$KEY];
      - pattern: echo $_REQUEST[$KEY];
      - pattern: print $_GET[$KEY];
      - pattern: print $_POST[$KEY];
      - pattern: print $_REQUEST[$KEY];
    message: >
      Unsanitized user input echoed directly to output.
      Use htmlspecialchars() or htmlentities() before output.
    languages: [php]
    severity: ERROR
    metadata:
      owasp: "A03:2025 - Injection"
      confidence: HIGH
      vuln_type: xss

  - id: php-xss-echo-concatenation
    patterns:
      - pattern: echo "..." . $_GET[$KEY] . "...";
      - pattern: echo "..." . $_POST[$KEY] . "...";
      - pattern: echo "..." . $_REQUEST[$KEY] . "...";
    message: >
      User input concatenated into echo statement without sanitization.
      Use htmlspecialchars($_GET[$KEY], ENT_QUOTES, 'UTF-8').
    languages: [php]
    severity: ERROR
    metadata:
      owasp: "A03:2025 - Injection"
      confidence: HIGH
      vuln_type: xss

  # ── PHP: two-step taint — variable from GET/POST/REQUEST then echoed ────────
  # Matches DVWA-style code:
  #   $name = $_GET['name'];
  #   echo "Hello " . $name;
  - id: php-xss-taint-echo-get
    pattern: |
      $VAR = $_GET[$KEY];
      ...
      echo $MSG . $VAR;
    message: >
      User input from $_GET assigned to variable then echoed without
      sanitization. Use htmlspecialchars($VAR, ENT_QUOTES, 'UTF-8').
    languages: [php]
    severity: ERROR
    metadata:
      owasp: "A03:2025 - Injection"
      confidence: HIGH
      vuln_type: xss

  - id: php-xss-taint-echo-post
    pattern: |
      $VAR = $_POST[$KEY];
      ...
      echo $MSG . $VAR;
    message: >
      User input from $_POST assigned to variable then echoed without
      sanitization. Use htmlspecialchars($VAR, ENT_QUOTES, 'UTF-8').
    languages: [php]
    severity: ERROR
    metadata:
      owasp: "A03:2025 - Injection"
      confidence: HIGH
      vuln_type: xss

  - id: php-xss-taint-echo-request
    pattern: |
      $VAR = $_REQUEST[$KEY];
      ...
      echo $MSG . $VAR;
    message: >
      User input from $_REQUEST assigned to variable then echoed without
      sanitization. Use htmlspecialchars($VAR, ENT_QUOTES, 'UTF-8').
    languages: [php]
    severity: ERROR
    metadata:
      owasp: "A03:2025 - Injection"
      confidence: HIGH
      vuln_type: xss

  # ── PHP: variable interpolated into HTML output ─────────────────────────────
  - id: php-xss-taint-interpolation-get
    pattern: |
      $VAR = $_GET[$KEY];
      ...
      $HTML = "...{$VAR}...";
    message: >
      User input from $_GET interpolated into HTML string. This will
      reflect unsanitized data in the response. Use htmlspecialchars().
    languages: [php]
    severity: ERROR
    metadata:
      owasp: "A03:2025 - Injection"
      confidence: HIGH
      vuln_type: xss

  - id: php-xss-taint-interpolation-post
    pattern: |
      $VAR = $_POST[$KEY];
      ...
      $HTML = "...{$VAR}...";
    message: >
      User input from $_POST interpolated into HTML string. This will
      reflect unsanitized data in the response. Use htmlspecialchars().
    languages: [php]
    severity: ERROR
    metadata:
      owasp: "A03:2025 - Injection"
      confidence: HIGH
      vuln_type: xss

  # ── JavaScript: innerHTML / document.write with user data ───────────────────
  - id: js-xss-innerhtml
    patterns:
      - pattern: $EL.innerHTML = location.$PROP;
      - pattern: $EL.innerHTML = document.URL;
      - pattern: $EL.innerHTML = $VAR;
    message: >
      Assigning potentially untrusted data to innerHTML can lead to XSS.
      Use textContent or sanitize input before assignment.
    languages: [javascript, typescript]
    severity: ERROR
    metadata:
      owasp: "A03:2025 - Injection"
      confidence: MEDIUM
      vuln_type: xss

  - id: js-xss-document-write
    patterns:
      - pattern: document.write(location.$PROP)
      - pattern: document.write($VAR)
    message: >
      document.write() with unvalidated data can introduce XSS.
      Avoid document.write(); use DOM manipulation instead.
    languages: [javascript, typescript]
    severity: ERROR
    metadata:
      owasp: "A03:2025 - Injection"
      confidence: MEDIUM
      vuln_type: xss

  # ── Python/Flask: unescaped template rendering ──────────────────────────────
  - id: python-xss-flask-markup
    patterns:
      - pattern: Markup(request.args.get($KEY))
      - pattern: Markup(request.form.get($KEY))
    message: >
      Marking user input as safe Markup bypasses Jinja2 auto-escaping.
      Remove Markup() wrapper to allow automatic HTML escaping.
    languages: [python]
    severity: ERROR
    metadata:
      owasp: "A03:2025 - Injection"
      confidence: HIGH
      vuln_type: xss
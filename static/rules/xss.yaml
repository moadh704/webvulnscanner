rules:

  # ── PHP: echo/print of unsanitized user input (single-line) ─────────────────
  - id: php-xss-echo-get
    patterns:
      - pattern: echo $_GET[$KEY];
      - pattern: echo $_POST[$KEY];
      - pattern: echo $_REQUEST[$KEY];
      - pattern: print $_GET[$KEY];
      - pattern: print $_POST[$KEY];
      - pattern: print $_REQUEST[$KEY];
    message: >
      Unsanitized user input echoed directly to output.
      Use htmlspecialchars() or htmlentities() before output.
    languages: [php]
    severity: ERROR
    metadata:
      owasp: "A05:2025 - Injection"
      confidence: HIGH
      vuln_type: xss

  - id: php-xss-echo-concatenation
    patterns:
      - pattern: echo "..." . $_GET[$KEY] . "...";
      - pattern: echo "..." . $_POST[$KEY] . "...";
      - pattern: echo "..." . $_REQUEST[$KEY] . "...";
    message: >
      User input concatenated into echo statement without sanitization.
      Use htmlspecialchars($_GET[$KEY], ENT_QUOTES, 'UTF-8').
    languages: [php]
    severity: ERROR
    metadata:
      owasp: "A05:2025 - Injection"
      confidence: HIGH
      vuln_type: xss

  # ── PHP: two-step taint — variable from GET/POST/REQUEST then echoed ────────
  - id: php-xss-taint-echo-get
    pattern: |
      $VAR = $_GET[$KEY];
      ...
      echo $MSG . $VAR;
    message: >
      User input from $_GET assigned to variable then echoed without
      sanitization. Use htmlspecialchars($VAR, ENT_QUOTES, 'UTF-8').
    languages: [php]
    severity: ERROR
    metadata:
      owasp: "A05:2025 - Injection"
      confidence: HIGH
      vuln_type: xss

  - id: php-xss-taint-echo-post
    pattern: |
      $VAR = $_POST[$KEY];
      ...
      echo $MSG . $VAR;
    message: >
      User input from $_POST assigned to variable then echoed without
      sanitization. Use htmlspecialchars($VAR, ENT_QUOTES, 'UTF-8').
    languages: [php]
    severity: ERROR
    metadata:
      owasp: "A05:2025 - Injection"
      confidence: HIGH
      vuln_type: xss

  - id: php-xss-taint-echo-request
    pattern: |
      $VAR = $_REQUEST[$KEY];
      ...
      echo $MSG . $VAR;
    message: >
      User input from $_REQUEST assigned to variable then echoed without
      sanitization. Use htmlspecialchars($VAR, ENT_QUOTES, 'UTF-8').
    languages: [php]
    severity: ERROR
    metadata:
      owasp: "A05:2025 - Injection"
      confidence: HIGH
      vuln_type: xss

  - id: php-xss-taint-interpolation-get
    pattern: |
      $VAR = $_GET[$KEY];
      ...
      $HTML = "...{$VAR}...";
    message: >
      User input from $_GET interpolated into HTML string. This will
      reflect unsanitized data in the response. Use htmlspecialchars().
    languages: [php]
    severity: ERROR
    metadata:
      owasp: "A05:2025 - Injection"
      confidence: HIGH
      vuln_type: xss

  - id: php-xss-taint-interpolation-post
    pattern: |
      $VAR = $_POST[$KEY];
      ...
      $HTML = "...{$VAR}...";
    message: >
      User input from $_POST interpolated into HTML string. This will
      reflect unsanitized data in the response. Use htmlspecialchars().
    languages: [php]
    severity: ERROR
    metadata:
      owasp: "A05:2025 - Injection"
      confidence: HIGH
      vuln_type: xss

  - id: php-xss-taint-ternary
    patterns:
      - pattern-either:
          - pattern: |
              $VAR = $COND ? $_GET[$KEY] : $X;
              ...
              echo $MSG . $VAR;
          - pattern: |
              $VAR = $COND ? $X : $_GET[$KEY];
              ...
              echo $MSG . $VAR;
          - pattern: |
              $VAR = $COND ? $_POST[$KEY] : $X;
              ...
              echo $MSG . $VAR;
          - pattern: |
              $VAR = $COND ? $X : $_POST[$KEY];
              ...
              echo $MSG . $VAR;
          - pattern: |
              $VAR = $COND ? $_REQUEST[$KEY] : $X;
              ...
              echo $MSG . $VAR;
    message: >
      User input from $_GET/$_POST/$_REQUEST via ternary expression flows into
      echo without sanitization. Use htmlspecialchars($VAR, ENT_QUOTES, 'UTF-8').
    languages: [php]
    severity: ERROR
    metadata:
      owasp: "A05:2025 - Injection"
      confidence: MEDIUM
      vuln_type: xss

  - id: php-xss-taint-mutillidae-style
    patterns:
      - pattern-either:
          - pattern: |
              $V = isset($_GET[$K]) ? $_GET[$K] : $D;
              ...
              echo $MSG . $V;
          - pattern: |
              $V = isset($_POST[$K]) ? $_POST[$K] : $D;
              ...
              echo $MSG . $V;
          - pattern: |
              $V = isset($_REQUEST[$K]) ? $_REQUEST[$K] : $D;
              ...
              echo $V;
          - pattern: |
              $V = isset($_GET[$K]) ? $_GET[$K] : $D;
              ...
              echo $V;
          - pattern: |
              $V = isset($_POST[$K]) ? $_POST[$K] : $D;
              ...
              echo $V;
          - pattern: |
              $V = isset($_REQUEST[$K]) ? $_REQUEST[$K] : $D;
              ...
              echo $V;
          - pattern: |
              $C ? $V = $_POST[$K] : $V = $_REQUEST[$K2];
              ...
              echo $MSG . $V;
          - pattern: |
              $C ? $V = $_GET[$K] : $V = $_REQUEST[$K2];
              ...
              echo $MSG . $V;
          - pattern: |
              $C ? $V = $_POST[$K] : $V = $_GET[$K2];
              ...
              echo $V;
          - pattern: |
              $C ? $V = $_GET[$K] : $V = $_REQUEST[$K2];
              ...
              echo $V;
          - pattern: |
              $V = $_GET[$K] ?? $_POST[$K2] ?? $D;
              ...
              echo $V;
          - pattern: |
              $V = $_POST[$K] ?? $_GET[$K2] ?? $D;
              ...
              echo $V;
    message: >
      User input via Mutillidae-style ternary (isset, ternary-wraps-assignment,
      or null-coalescing) flows into echo without sanitization.
      Use htmlspecialchars($V, ENT_QUOTES, 'UTF-8').
    languages: [php]
    severity: ERROR
    metadata:
      owasp: "A05:2025 - Injection"
      confidence: MEDIUM
      vuln_type: xss

  # ── PHP: source-only taint detection (fallback for cross-block flow) ────────
  - id: php-xss-taint-mutillidae-source-only
    patterns:
      - pattern-either:
          - pattern: |
              $V = isset($_GET[$K]) ? $_GET[$K] : $D;
          - pattern: |
              $V = isset($_POST[$K]) ? $_POST[$K] : $D;
          - pattern: |
              $V = isset($_REQUEST[$K]) ? $_REQUEST[$K] : $D;
          - pattern: |
              $C ? $V = $_POST[$K] : $V = $_REQUEST[$K2];
              ...
              $C ? $V = $_GET[$K] : $V = $_REQUEST[$K2];
          - pattern: |
              $C ? $V = $_GET[$K] : $V = $_GET[$K2];
          - pattern: |
              $V = $_GET[$K] ?? $_POST[$K2] ?? $D;
              ...
              $V = $_POST[$K] ?? $_GET[$K2] ?? $D;
              ...
              $V = $_GET[$K] ?? $_GET[$K2] ?? $D;
    message: >
      User input from $_GET/$_POST/$_REQUEST captured into a variable via
      a ternary expression (isset, ternary-wraps-assignment, or null-coalescing).
      Static engine cannot trace the variable across HTML/PHP interpolation
      blocks. If this variable reaches an echo without htmlspecialchars(),
      it is reflected XSS. Verify dynamically.
    languages: [php]
    severity: WARNING
    metadata:
      owasp: "A05:2025 - Injection"
      confidence: LOW
      vuln_type: xss

  # ── JavaScript: innerHTML / document.write with user data ───────────────────
  - id: js-xss-innerhtml
    patterns:
      - pattern: $EL.innerHTML = location.$PROP;
      - pattern: $EL.innerHTML = document.URL;
      - pattern: $EL.innerHTML = $VAR;
    message: >
      Assigning potentially untrusted data to innerHTML can lead to XSS.
      Use textContent or sanitize input before assignment.
    languages: [javascript, typescript]
    severity: ERROR
    metadata:
      owasp: "A05:2025 - Injection"
      confidence: MEDIUM
      vuln_type: xss

  - id: js-xss-document-write
    patterns:
      - pattern: document.write(location.$PROP)
      - pattern: document.write($VAR)
    message: >
      document.write() with unvalidated data can introduce XSS.
      Avoid document.write(); use DOM manipulation instead.
    languages: [javascript, typescript]
    severity: ERROR
    metadata:
      owasp: "A05:2025 - Injection"
      confidence: MEDIUM
      vuln_type: xss

  # ── JavaScript: dangerouslySetInnerHTML (React) ─────────────────────────────
  - id: js-xss-dangerouslysetinnerhtml
    patterns:
      - pattern: dangerouslySetInnerHTML={{ __html: $VAR }}
      - pattern: dangerouslySetInnerHTML={{ __html: props.$KEY }}
    message: >
      Using dangerouslySetInnerHTML with unsanitized data can lead to XSS in React.
      Sanitize content or avoid dangerouslySetInnerHTML when possible.
    languages: [javascript, typescript]
    severity: ERROR
    metadata:
      owasp: "A05:2025 - Injection"
      confidence: HIGH
      vuln_type: xss

  # ── Python: Flask Markup bypass ─────────────────────────────────────────────
  - id: python-xss-flask-markup
    patterns:
      - pattern: Markup(request.args.get($KEY))
      - pattern: Markup(request.form.get($KEY))
    message: >
      Marking user input as safe Markup bypasses Jinja2 auto-escaping.
      Remove Markup() wrapper to allow automatic HTML escaping.
    languages: [python]
    severity: ERROR
    metadata:
      owasp: "A05:2025 - Injection"
      confidence: HIGH
      vuln_type: xss

  # ── Python: f-string rendered in template without escaping ───────────────────
  - id: python-xss-fstring-template
    patterns:
      - pattern: render_template(..., var=f"...{request.args.get($KEY)}...")
    message: >
      User input used inside f-string passed to render_template.
      This may bypass auto-escaping depending on context.
    languages: [python]
    severity: ERROR
    metadata:
      owasp: "A05:2025 - Injection"
      confidence: MEDIUM
      vuln_type: xss
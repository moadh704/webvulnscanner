rules:

  # ── PHP: system/exec with user input (single-line) ──────────────────────────
  - id: php-cmdi-system
    patterns:
      - pattern: system($_GET[$KEY]);
      - pattern: system($_POST[$KEY]);
      - pattern: system($_REQUEST[$KEY]);
      - pattern: system($CMD . $_GET[$KEY]);
      - pattern: system($CMD . $_POST[$KEY]);
      - pattern: system($CMD . $_REQUEST[$KEY]);
    message: >
      User input passed directly to system(). An attacker can inject
      arbitrary OS commands. Use escapeshellarg() or avoid shell calls.
    languages: [php]
    severity: ERROR
    metadata:
      owasp: "A03:2025 - Injection"
      confidence: HIGH
      vuln_type: cmdi

  - id: php-cmdi-exec
    patterns:
      - pattern: exec($_GET[$KEY]);
      - pattern: exec($_POST[$KEY]);
      - pattern: exec($_REQUEST[$KEY]);
      - pattern: exec($CMD . $_GET[$KEY], $OUT);
      - pattern: exec($CMD . $_POST[$KEY], $OUT);
      - pattern: exec($CMD . $_REQUEST[$KEY], $OUT);
    message: >
      User input passed to exec(). Use escapeshellarg() to sanitize
      input or avoid executing OS commands from user data.
    languages: [php]
    severity: ERROR
    metadata:
      owasp: "A03:2025 - Injection"
      confidence: HIGH
      vuln_type: cmdi

  - id: php-cmdi-shell-exec
    patterns:
      - pattern: shell_exec($_GET[$KEY]);
      - pattern: shell_exec($_POST[$KEY]);
      - pattern: shell_exec($_REQUEST[$KEY]);
      - pattern: shell_exec($CMD . $_GET[$KEY]);
      - pattern: shell_exec($CMD . $_POST[$KEY]);
      - pattern: shell_exec($CMD . $_REQUEST[$KEY]);
    message: >
      User input passed to shell_exec(). Sanitize with escapeshellarg()
      or use a safer alternative.
    languages: [php]
    severity: ERROR
    metadata:
      owasp: "A03:2025 - Injection"
      confidence: HIGH
      vuln_type: cmdi

  - id: php-cmdi-passthru
    patterns:
      - pattern: passthru($_GET[$KEY]);
      - pattern: passthru($_POST[$KEY]);
      - pattern: passthru($_REQUEST[$KEY]);
      - pattern: passthru($CMD . $_GET[$KEY]);
      - pattern: passthru($CMD . $_POST[$KEY]);
      - pattern: passthru($CMD . $_REQUEST[$KEY]);
    message: >
      User input passed to passthru(). This allows OS command injection.
    languages: [php]
    severity: ERROR
    metadata:
      owasp: "A03:2025 - Injection"
      confidence: HIGH
      vuln_type: cmdi

  # ── PHP: two-step taint — variable from GET/POST/REQUEST then shell call ────
  # Matches DVWA-style code:
  #   $target = $_REQUEST['ip'];
  #   $cmd = shell_exec('ping ' . $target);
  - id: php-cmdi-taint-shell-exec-get
    pattern: |
      $VAR = $_GET[$KEY];
      ...
      shell_exec($CMD . $VAR);
    message: >
      User input from $_GET assigned to variable then concatenated into
      shell_exec(). This allows OS command injection. Use escapeshellarg().
    languages: [php]
    severity: ERROR
    metadata:
      owasp: "A03:2025 - Injection"
      confidence: HIGH
      vuln_type: cmdi

  - id: php-cmdi-taint-shell-exec-post
    pattern: |
      $VAR = $_POST[$KEY];
      ...
      shell_exec($CMD . $VAR);
    message: >
      User input from $_POST assigned to variable then concatenated into
      shell_exec(). This allows OS command injection. Use escapeshellarg().
    languages: [php]
    severity: ERROR
    metadata:
      owasp: "A03:2025 - Injection"
      confidence: HIGH
      vuln_type: cmdi

  - id: php-cmdi-taint-shell-exec-request
    pattern: |
      $VAR = $_REQUEST[$KEY];
      ...
      shell_exec($CMD . $VAR);
    message: >
      User input from $_REQUEST assigned to variable then concatenated into
      shell_exec(). This allows OS command injection. Use escapeshellarg().
    languages: [php]
    severity: ERROR
    metadata:
      owasp: "A03:2025 - Injection"
      confidence: HIGH
      vuln_type: cmdi

  - id: php-cmdi-taint-system-request
    pattern: |
      $VAR = $_REQUEST[$KEY];
      ...
      system($CMD . $VAR);
    message: >
      User input from $_REQUEST assigned to variable then used in system().
      Sanitize with escapeshellarg() or avoid shell calls.
    languages: [php]
    severity: ERROR
    metadata:
      owasp: "A03:2025 - Injection"
      confidence: HIGH
      vuln_type: cmdi

  - id: php-cmdi-taint-exec-request
    pattern: |
      $VAR = $_REQUEST[$KEY];
      ...
      exec($CMD . $VAR);
    message: >
      User input from $_REQUEST assigned to variable then used in exec().
      Sanitize with escapeshellarg() or avoid shell calls.
    languages: [php]
    severity: ERROR
    metadata:
      owasp: "A03:2025 - Injection"
      confidence: HIGH
      vuln_type: cmdi

  # ── PHP: ternary taint — variable from ternary involving GET/POST/REQUEST ───
  # Matches Mutillidae-style: $var = $cond ? $_POST["x"] : $default;
  - id: php-cmdi-taint-ternary
    patterns:
      - pattern-either:
          - pattern: |
              $VAR = $COND ? $_GET[$KEY] : $X;
              ...
              shell_exec($CMD . $VAR);
          - pattern: |
              $VAR = $COND ? $X : $_GET[$KEY];
              ...
              shell_exec($CMD . $VAR);
          - pattern: |
              $VAR = $COND ? $_POST[$KEY] : $X;
              ...
              shell_exec($CMD . $VAR);
          - pattern: |
              $VAR = $COND ? $X : $_POST[$KEY];
              ...
              shell_exec($CMD . $VAR);
          - pattern: |
              $VAR = $COND ? $_REQUEST[$KEY] : $X;
              ...
              shell_exec($CMD . $VAR);
          - pattern: |
              $VAR = $COND ? $X : $_REQUEST[$KEY];
              ...
              shell_exec($CMD . $VAR);
    message: >
      User input from $_GET/$_POST/$_REQUEST via ternary expression flows into
      shell_exec(). Use escapeshellarg() or avoid shell calls entirely.
    languages: [php]
    severity: ERROR
    metadata:
      owasp: "A03:2025 - Injection"
      confidence: MEDIUM
      vuln_type: cmdi

  # ── Python: os.system / subprocess with user input ──────────────────────────
  - id: python-cmdi-os-system
    patterns:
      - pattern: os.system(request.args.get($KEY))
      - pattern: os.system(request.form.get($KEY))
      - pattern: os.system($CMD + request.$METHOD.get($KEY))
    message: >
      User input passed to os.system(). Use subprocess with a list
      of arguments and shell=False instead.
    languages: [python]
    severity: ERROR
    metadata:
      owasp: "A03:2025 - Injection"
      confidence: HIGH
      vuln_type: cmdi

  - id: python-cmdi-subprocess
    patterns:
      - pattern: subprocess.call($CMD + request.$METHOD.get($KEY), shell=True)
      - pattern: subprocess.run($CMD + request.$METHOD.get($KEY), shell=True)
      - pattern: subprocess.Popen($CMD + request.$METHOD.get($KEY), shell=True)
    message: >
      User input concatenated into subprocess call with shell=True.
      Use shell=False and pass arguments as a list.
    languages: [python]
    severity: ERROR
    metadata:
      owasp: "A03:2025 - Injection"
      confidence: HIGH
      vuln_type: cmdi
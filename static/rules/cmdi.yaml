rules:

  # ── PHP: system/exec with direct user input ─────────────────────────────────
  - id: php-cmdi-system-get
    patterns:
      - pattern: system($_GET[$KEY])
      - pattern: system($_POST[$KEY])
      - pattern: system($_REQUEST[$KEY])
      - pattern: exec($_GET[$KEY])
      - pattern: exec($_POST[$KEY])
      - pattern: exec($_REQUEST[$KEY])
      - pattern: passthru($_GET[$KEY])
      - pattern: passthru($_POST[$KEY])
      - pattern: passthru($_REQUEST[$KEY])
      - pattern: shell_exec($_GET[$KEY])
      - pattern: shell_exec($_POST[$KEY])
      - pattern: shell_exec($_REQUEST[$KEY])
    message: >
      User input passed directly to system/exec/shell_exec/passthru().
      This can lead to command injection. Use escapeshellarg() and escapeshellcmd().
    languages: [php]
    severity: ERROR
    metadata:
      owasp: "A05:2025 - Injection"
      confidence: HIGH
      vuln_type: cmdi

  # ── PHP: two-step taint into system/exec ────────────────────────────────────
  - id: php-cmdi-taint-get
    pattern: |
      $VAR = $_GET[$KEY];
      ...
      system($VAR);
    message: >
      User input from $_GET assigned to variable then passed to system().
      Use proper escaping or avoid shell commands.
    languages: [php]
    severity: ERROR
    metadata:
      owasp: "A05:2025 - Injection"
      confidence: HIGH
      vuln_type: cmdi

  - id: php-cmdi-taint-post
    pattern: |
      $VAR = $_POST[$KEY];
      ...
      exec($VAR);
    message: >
      User input from $_POST assigned to variable then passed to exec().
      Sanitize or avoid shell execution.
    languages: [php]
    severity: ERROR
    metadata:
      owasp: "A05:2025 - Injection"
      confidence: HIGH
      vuln_type: cmdi

  # ── PHP: string concatenation in shell command ─────────────────────────────
  - id: php-cmdi-concat
    patterns:
      - pattern: system("..." . $_GET[$KEY] . "...")
      - pattern: exec("..." . $_POST[$KEY] . "...")
      - pattern: shell_exec("..." . $_REQUEST[$KEY] . "...")
    message: >
      User input concatenated into shell command string.
      Use escapeshellarg() on every user-controlled value.
    languages: [php]
    severity: ERROR
    metadata:
      owasp: "A05:2025 - Injection"
      confidence: HIGH
      vuln_type: cmdi

  # ── Python: os.system / subprocess with user input ─────────────────────────
  - id: python-cmdi-os-system
    patterns:
      - pattern: os.system(request.args.get($KEY))
      - pattern: os.system(request.form.get($KEY))
      - pattern: os.system("..." + request.$METHOD.get($KEY))
    message: >
      User input passed to os.system(). This is highly dangerous.
      Use subprocess with shell=False and proper argument list instead.
    languages: [python]
    severity: ERROR
    metadata:
      owasp: "A05:2025 - Injection"
      confidence: HIGH
      vuln_type: cmdi

  - id: python-cmdi-subprocess-shell-true
    patterns:
      - pattern: subprocess.call(..., shell=True)
      - pattern: subprocess.Popen(..., shell=True)
    message: >
      subprocess called with shell=True and user input. This enables command injection.
      Use shell=False and pass arguments as a list.
    languages: [python]
    severity: ERROR
    metadata:
      owasp: "A05:2025 - Injection"
      confidence: HIGH
      vuln_type: cmdi

  # ── JavaScript/Node: child_process with user input ──────────────────────────
  - id: js-cmdi-child-process
    patterns:
      - pattern: exec(req.$METHOD.$KEY)
      - pattern: execSync(req.$METHOD.$KEY)
      - pattern: spawn(req.$METHOD.$KEY, ..., { shell: true })
    message: >
      User input passed to child_process exec/execSync with shell enabled.
      Avoid shell: true or properly sanitize/validate input.
    languages: [javascript, typescript]
    severity: ERROR
    metadata:
      owasp: "A05:2025 - Injection"
      confidence: HIGH
      vuln_type: cmdi